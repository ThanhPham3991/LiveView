<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>PNJ · EB Performance Hub</title><style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap');
*{box-sizing:border-box;}
:root{--ink:#1F2937;--muted:#6B7280;--bg:#F4F7FC;--card:#FFFFFF;--bd:#E3E9F2;
--blue:#315BFF;--navy:#1939B7;--blued:#0B1E6D;--gold:#C99A18;--green:#1F8A5B;--red:#D9482E;--cyan:#3CBED8;}
body{margin:0;}
#root{font-family:'Roboto',system-ui,Arial,sans-serif;color:var(--ink);background:var(--bg);min-height:100vh;display:block;
background-image:radial-gradient(circle at 8% 4%,rgba(51,102,255,.06),transparent 40%),radial-gradient(circle at 92% 0%,rgba(255,171,0,.06),transparent 42%);}
#boot{font-family:'Roboto',sans-serif;padding:48px;color:var(--muted);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:20;background:rgba(244,247,252,.88);backdrop-filter:blur(10px);}
.brand{display:flex;align-items:center;gap:13px;}
.brand-logo{height:42px;width:auto;display:block;}
.brand-line1{font-size:10px;letter-spacing:.2em;color:var(--navy);font-weight:700;}
.brand-line2{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:19px;font-weight:700;line-height:1.1;color:var(--ink);}
.topbar-actions{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.seg{display:flex;background:#fff;border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
.seg button{border:0;background:transparent;padding:8px 15px;font:inherit;font-size:13px;color:var(--muted);cursor:pointer;font-weight:500;}
.seg .seg-on{background:linear-gradient(135deg,#3366FF,#1939B7);color:#fff;font-weight:700;}
.btn{border:0;border-radius:10px;padding:9px 15px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
.btn.ghost{background:#fff;border:1px solid var(--bd);color:var(--ink);}
.btn.ghost:hover{border-color:var(--blue);color:var(--blue);}
.btn.solid{background:var(--blue);color:#fff;}
.btn.solid:hover{background:var(--blued);}
.btn.mini{padding:7px 12px;font-size:12px;margin-bottom:8px;}
.link-btn{background:none;border:0;color:var(--muted);cursor:pointer;font:inherit;font-size:12px;margin-left:12px;text-decoration:underline;}
.context-bar{display:flex;justify-content:space-between;align-items:flex-end;padding:22px 28px 6px;gap:16px;}
.context-title{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:25px;font-weight:700;}
.context-sub{color:var(--muted);font-size:13px;margin-top:3px;}
.context-meta{font-size:12px;color:var(--muted);text-align:right;}
.tabs{display:flex;gap:8px;padding:14px 28px 0;flex-wrap:wrap;}
.tab{border:1px solid transparent;background:transparent;padding:8px 15px;border-radius:999px;font:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;}
.tab:hover{color:var(--ink);}
.tab.on{background:#fff;border:1px solid var(--bd);color:var(--ink);box-shadow:0 3px 12px rgba(31,41,55,.06);}
.content{padding:22px 28px 40px;}
.stack{display:flex;flex-direction:column;gap:18px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.panel{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:18px 20px;box-shadow:0 6px 20px rgba(31,41,55,.04);}
.panel-head{margin-bottom:14px;}
.panel-htitle{display:flex;align-items:center;gap:11px;}
.panel-title{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:17px;font-weight:700;margin:0;}
.panel-sub{font-size:12px;color:var(--muted);margin:3px 0 0;}
.insight{display:flex;gap:12px;align-items:flex-start;background:linear-gradient(90deg,#fff,#EEF3FF);border:1px solid #CBDAFE;border-left:3px solid var(--blue);border-radius:12px;padding:14px 18px;font-size:13.5px;line-height:1.5;}
.insight-dot{width:9px;height:9px;border-radius:50%;background:var(--blue);margin-top:6px;flex:none;box-shadow:0 0 0 4px rgba(51,102,255,.18);}
.cicon{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;flex:none;}
.gly{color:#fff;font-weight:800;font-size:16px;font-family:Arial,sans-serif;line-height:1;}
.group-panel{padding:18px 20px;}
.group-head{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
.group-name{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:18px;font-weight:700;margin:0;}
.mtile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;}
.mtile{background:#F7FAFF;border:1px solid var(--bd);border-radius:13px;padding:14px 15px;}
.mtile-label{font-size:12px;color:var(--muted);font-weight:500;min-height:32px;}
.mtile-val{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:27px;font-weight:700;margin:2px 0;}
.src-box{margin-top:16px;border-top:1px dashed var(--bd);padding-top:14px;}
.src-box-title{font-size:12px;font-weight:700;color:#4B5563;margin-bottom:8px;}
.load{margin:9px 0 2px;}
.load-track{height:8px;background:#E9EEF6;border-radius:6px;overflow:hidden;}
.load-fill{height:100%;border-radius:6px;transition:width .5s;}
.load-pct{font-size:10.5px;color:var(--muted);font-weight:600;display:block;margin-top:4px;}
.delta{font-size:12px;font-weight:700;}
.delta-up{color:var(--green);}.delta-down{color:var(--red);}.delta-flat{color:var(--muted);}
.kpi-foot{min-height:16px;}
.funnel{display:flex;flex-direction:column;gap:14px;padding-top:4px;}
.funnel-meta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.funnel-label{font-weight:600;}
.funnel-val{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;}
.funnel-track{height:14px;background:#E9EEF6;border-radius:8px;overflow:hidden;}
.funnel-fill{height:100%;border-radius:8px;transition:width .5s;}
.funnel-conv{font-size:11px;color:var(--muted);margin-top:4px;}
.ch-header{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1px solid var(--bd);border-left:4px solid;border-radius:14px;padding:16px 22px;}
.ch-head-l{display:flex;align-items:center;gap:13px;}
.ch-name{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:21px;font-weight:700;}
.ch-aud{font-size:13px;color:var(--muted);margin-top:2px;}
.ch-pill{font-size:12px;font-weight:700;padding:6px 14px;border-radius:999px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:14px;}
.kpi-card{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:16px;box-shadow:0 4px 14px rgba(31,41,55,.03);}
.kpi-label{font-size:12px;color:var(--muted);font-weight:500;}
.kpi-value{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:27px;font-weight:700;margin:6px 0 4px;}
.role-text{font-size:14px;line-height:1.65;color:#374151;margin:0 0 14px;}
.role-tag{font-size:12px;font-weight:700;}
.clarify{background:#FFF7E6;border:1px solid #FFE2A6;border-left:3px solid var(--gold);border-radius:10px;padding:12px 16px;font-size:13px;line-height:1.5;}
.evp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.evp-card{background:#F7FAFF;border:1px solid var(--bd);border-radius:13px;padding:16px;}
.evp-name{font-weight:700;font-size:14px;margin-bottom:8px;}
.evp-nums{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:18px;}
.evp-nums b{font-size:27px;}
.pl-table{width:100%;border-collapse:collapse;font-size:13px;}
.pl-table th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:6px 8px;border-bottom:2px solid var(--bd);}
.pl-table td{padding:9px 8px;border-bottom:1px solid #EEF2F8;vertical-align:top;}
.pl-name{font-weight:700;width:34%;}
.pl-posts{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:16px;width:14%;}
.pl-topics{color:#4B5563;}
.proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.proj-card{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:18px 20px;box-shadow:0 4px 14px rgba(31,41,55,.04);}
.proj-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:10px;}
.proj-name{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:18px;font-weight:700;}
.proj-type{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}
.proj-badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:999px;white-space:nowrap;}
.proj-prog{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.proj-prog .load-track{flex:1;height:10px;}
.proj-pct{font-size:12px;font-weight:700;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;width:40px;text-align:right;}
.proj-line{font-size:12px;color:#4B5563;margin-bottom:8px;}
.proj-row{display:flex;gap:8px;font-size:12.5px;line-height:1.5;margin-top:6px;align-items:flex-start;}
.proj-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;flex:none;margin-top:1px;white-space:nowrap;}
.proj-tag.done{background:#E6F7EF;color:#1F8A5B;}
.proj-tag.next{background:#EAF0FF;color:#2952E3;}
.proj-tag.pain{background:#FFEDE6;color:#E64A1B;}
.legend{display:flex;gap:16px;justify-content:center;font-size:11px;color:var(--ink);margin-top:8px;flex-wrap:wrap;}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle;}
.legend-col{flex-direction:column;gap:8px;align-items:flex-start;margin-top:0;}
.pie-wrap{display:flex;align-items:center;gap:20px;justify-content:center;flex-wrap:wrap;padding-top:6px;}
.hbars{display:flex;flex-direction:column;gap:12px;padding-top:6px;}
.hbar-row{display:flex;align-items:center;gap:10px;}
.hbar-name{width:110px;font-size:12px;font-weight:600;flex:none;}
.hbar-track{flex:1;height:13px;background:#E9EEF6;border-radius:8px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:8px;}
.hbar-val{width:56px;text-align:right;font-size:12px;font-weight:700;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;flex:none;}
svg{display:block;}
.foot-note{padding:18px 28px 32px;font-size:11px;color:var(--muted);border-top:1px solid var(--bd);}
.modal-overlay{position:fixed;inset:0;background:rgba(31,41,55,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal{background:var(--bg);border-radius:18px;width:760px;max-width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.3);}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--bd);}
.modal-head h3{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:18px;margin:0;font-weight:700;}
.x-btn{border:0;background:#fff;border:1px solid var(--bd);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:14px;}
.modal-body{padding:20px 24px;overflow-y:auto;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--bd);}
.edit-channel{margin-bottom:18px;}
.edit-channel-title{font-weight:700;font-size:13px;margin-bottom:8px;}
.edit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--muted);margin-bottom:10px;}
.field input{font:inherit;font-size:14px;color:var(--ink);padding:8px 10px;border:1px solid #D4DCEA;border-radius:8px;background:#fff;}
.field input:focus{outline:none;border-color:var(--blue);}
.src-intro{font-size:13px;line-height:1.6;color:#374151;margin:0 0 14px;}
.src-method{border:1px solid var(--bd);border-radius:12px;padding:14px 16px;margin-bottom:14px;background:#fff;}
.src-step{font-weight:700;font-size:13px;margin-bottom:4px;}
.src-hint{font-size:12px;color:var(--muted);line-height:1.55;margin:0 0 10px;}
.src-method textarea{width:100%;min-height:64px;font-family:monospace;font-size:11px;padding:10px;border:1px solid #D4DCEA;border-radius:8px;resize:vertical;margin-bottom:8px;}
.src-status{font-size:13px;padding:11px 14px;border-radius:9px;line-height:1.5;margin-top:6px;}
.src-info{background:#EAF0FF;color:#2952E3;}.src-ok{background:#E6F7EF;color:#1F8A5B;}.src-err{background:#FFEDE6;color:#E64A1B;}
@media (max-width:900px){.grid-2{grid-template-columns:1fr;}.evp-grid{grid-template-columns:1fr;}.proj-grid{grid-template-columns:1fr;}}
@media print{.no-print{display:none!important;}#root{background:#fff;}.panel,.kpi-card,.proj-card,.mtile{box-shadow:none;break-inside:avoid;}.content{padding:8px 16px;}}


/* ===== PNJ EB Intelligence v6 — Market Report UI System ===== */
:root{
  --ink:#1F2937;
  --muted:#667085;
  --muted-2:#98A2B3;
  --bg:#F8FAFD;
  --card:#FFFFFF;
  --bd:#D6E4FF;
  --blue-darker:#091A7A;
  --blue-dark:#1939B7;
  --blue-main:#3366FF;
  --blue-light:#84A9FF;
  --blue-lighter:#D6E4FF;
  --gold-darker:#7A4100;
  --gold-dark:#B76E00;
  --gold-main:#FFAB00;
  --gold-light:#FFD666;
  --gold-lighter:#FFF5CC;
  --green:#36B37E;
  --red:#FF5630;
  --cyan:#00B8D9;
  --shadow-soft:0 18px 48px rgba(9,26,122,.07);
  --shadow-card:0 10px 30px rgba(9,26,122,.055);
}
body,#root{font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;}
#root{
  color:var(--ink);
  background:
    radial-gradient(circle at 7% 0%,rgba(51,102,255,.10),transparent 34%),
    radial-gradient(circle at 92% 2%,rgba(255,171,0,.12),transparent 30%),
    linear-gradient(180deg,#FBFCFF 0%,#F8FAFD 48%,#F2F6FC 100%);
}
.topbar{
  padding:14px 32px;
  background:rgba(255,255,255,.86);
  border-bottom:1px solid rgba(214,228,255,.85);
  box-shadow:0 4px 24px rgba(9,26,122,.045);
  backdrop-filter:blur(16px);
}
.brand-line1{color:var(--blue-dark);font-weight:800;letter-spacing:.22em;}
.brand-line2,.context-title,.panel-title,.group-name,.ch-name,.proj-name{font-family:'Inter',system-ui,sans-serif;letter-spacing:-.025em;}
.context-bar{padding:26px 32px 8px;}
.context-title{font-size:28px;font-weight:800;color:#172033;}
.context-sub{font-size:13.5px;color:#667085;}
.context-meta{color:#667085;}
.tabs{padding:16px 32px 0;}
.content{padding:24px 32px 52px;}
.seg{border:1px solid rgba(214,228,255,.95);box-shadow:0 6px 18px rgba(9,26,122,.04);}
.seg .seg-on{background:linear-gradient(135deg,var(--blue-dark),var(--blue-main));}
.btn{font-weight:700;}
.btn.ghost{border:1px solid rgba(214,228,255,.95);box-shadow:0 6px 16px rgba(9,26,122,.035);}
.btn.ghost:hover{border-color:var(--blue-light);color:var(--blue-dark);background:#F8FAFF;}
.btn.solid{background:linear-gradient(135deg,var(--blue-dark),var(--blue-main));box-shadow:0 10px 22px rgba(51,102,255,.22);}
.btn.solid:hover{background:linear-gradient(135deg,var(--blue-darker),var(--blue-dark));}
.tab{font-weight:700;}
.tab.on{background:#fff;border-color:rgba(214,228,255,.95);box-shadow:0 8px 22px rgba(9,26,122,.07);}
.panel,.group-panel,.kpi-card,.proj-card,.mtile,.evp-card,.strategic-card{
  background:rgba(255,255,255,.92);
  border:1px solid rgba(214,228,255,.85);
  box-shadow:var(--shadow-card);
}
.panel,.group-panel{border-radius:22px;padding:24px 26px;}
.kpi-card,.proj-card{border-radius:18px;padding:18px;}
.mtile,.evp-card{border-radius:17px;padding:17px 18px;background:linear-gradient(180deg,#FFFFFF 0%,#F8FAFF 100%);}
.panel-title{font-size:18px;font-weight:800;color:#172033;}
.panel-sub{color:#667085;font-size:12.5px;}
.mtile-label,.kpi-label,.strategic-label{
  text-transform:uppercase;
  letter-spacing:.06em;
  font-size:10.8px;
  color:#667085;
  font-weight:800;
}
.mtile-val,.kpi-value,.evp-nums b,.proj-pct{
  font-family:'Sora','Inter',system-ui,sans-serif;
  color:#111827;
  letter-spacing:-.035em;
}
.mtile-val,.kpi-value{font-size:28px;font-weight:800;}
.kpi-card,.proj-card,.mtile,.evp-card,.strategic-card{transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;}
.kpi-card:hover,.proj-card:hover,.mtile:hover,.evp-card:hover,.strategic-card:hover{transform:translateY(-2px);box-shadow:0 18px 42px rgba(9,26,122,.09);border-color:#84A9FF;}
.load-track,.funnel-track,.hbar-track{background:#EAF0FF;}
.load-pct{color:#667085;font-weight:700;}
.insight{
  background:linear-gradient(135deg,#F3F7FF 0%,#FFFFFF 58%,#FFF8E6 100%);
  border:1px solid #BCD2FF;
  border-left:4px solid var(--blue-main);
  box-shadow:0 10px 28px rgba(51,102,255,.07);
  border-radius:16px;
}
.insight-dot{background:var(--blue-main);box-shadow:0 0 0 4px rgba(51,102,255,.16);}
.cicon{box-shadow:0 8px 18px rgba(9,26,122,.12);}
.ch-header{border-radius:18px;border-color:rgba(214,228,255,.9);box-shadow:var(--shadow-card);}
.ch-pill{font-weight:800;}
.clarify{background:#FFF9E8;border-color:#FFE4A6;border-left-color:var(--gold-main);}
.pl-table th{color:#667085;}
.pl-table td{border-bottom:1px solid #EEF3FA;}
.proj-badge{font-weight:800;}
.proj-tag{border-radius:999px;font-weight:800;}
.legend{color:#344054;font-weight:600;}
.modal{background:#F8FAFD;box-shadow:0 30px 80px rgba(9,26,122,.22);}
.modal-head,.modal-foot{border-color:#D6E4FF;}
.field input,.src-method textarea{border-color:#D0D9EB;}
.field input:focus,.src-method textarea:focus{outline:none;border-color:var(--blue-main);box-shadow:0 0 0 3px rgba(51,102,255,.10);}
/* Executive Summary — bright, high-contrast Market Report style */
.exec-hero{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 91% 8%,rgba(255,214,102,.58),transparent 28%),
    radial-gradient(circle at 4% 92%,rgba(132,169,255,.40),transparent 30%),
    linear-gradient(135deg,#EEF4FF 0%,#D6E4FF 58%,#FFF7DE 100%);
  color:var(--blue-darker);
  border:1px solid rgba(132,169,255,.65);
  border-radius:28px;
  padding:28px 30px;
  box-shadow:0 24px 60px rgba(9,26,122,.12);
}
.exec-hero:before{
  content:"";
  position:absolute;
  top:-96px;right:-76px;
  width:280px;height:280px;
  border-radius:50%;
  background:rgba(255,255,255,.58);
}
.exec-hero:after{
  content:"";
  position:absolute;
  left:-90px;bottom:-140px;
  width:320px;height:320px;
  border-radius:50%;
  background:rgba(51,102,255,.12);
}
.exec-content{position:relative;z-index:1;display:grid;grid-template-columns:1.04fr 1.38fr;gap:26px;align-items:stretch;}
.exec-eyebrow{display:inline-flex;align-items:center;gap:8px;color:var(--gold-dark);font-weight:900;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:11px;}
.exec-title{font-family:'Inter',system-ui,sans-serif;font-size:31px;line-height:1.12;font-weight:900;letter-spacing:-.045em;margin:0 0 11px;color:var(--blue-darker);}
.exec-sub{color:#344054;font-size:13.8px;line-height:1.65;margin:0;max-width:570px;}
.exec-metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px;}
.exec-metric{background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.96);border-radius:20px;padding:17px 16px 15px;box-shadow:0 16px 34px rgba(9,26,122,.09);}
.exec-metric-label{font-size:10.3px;color:#667085;text-transform:uppercase;letter-spacing:.07em;font-weight:900;min-height:28px;}
.exec-metric-value{font-family:'Sora','Inter',system-ui,sans-serif;font-size:27px;font-weight:800;letter-spacing:-.045em;margin:5px 0 4px;color:var(--blue-darker);}
.exec-metric-note{font-size:11.5px;color:#667085;font-weight:800;}
.exec-metric.accent{background:linear-gradient(180deg,#FFF5CC 0%,#FFFFFF 100%);border-color:#FFD666;}
.exec-metric.good .exec-metric-note{color:#1F8A5B;}
.exec-metric.warn .exec-metric-note{color:#B76E00;}
.exec-brief{position:relative;z-index:1;margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.exec-brief-card{background:rgba(255,255,255,.64);border:1px solid rgba(255,255,255,.92);border-radius:20px;padding:15px 17px;color:#344054;backdrop-filter:blur(10px);box-shadow:0 10px 26px rgba(9,26,122,.06);}
.exec-brief-title{color:var(--blue-dark);font-size:10.8px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.exec-brief-text{font-size:13.2px;line-height:1.58;color:#344054;}
.exec-brief-text b{color:var(--blue-darker);}
.exec-section-label{display:flex;align-items:center;gap:10px;font-size:11.5px;color:#344054;font-weight:900;letter-spacing:.09em;text-transform:uppercase;margin:6px 0 -2px;}
.exec-section-label:before{content:"";width:34px;height:3px;border-radius:999px;background:linear-gradient(90deg,var(--blue-main),var(--gold-main));}
.strategic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.strategic-card{border-radius:20px;padding:18px 19px;background:linear-gradient(180deg,#FFFFFF 0%,#F8FAFF 100%);}
.strategic-text{color:#344054;font-size:13.2px;line-height:1.62;}
.strategic-text b{color:var(--blue-dark);}
@media (max-width:1100px){.exec-content{grid-template-columns:1fr;}.exec-metrics{grid-template-columns:repeat(2,1fr);}.strategic-grid{grid-template-columns:1fr;}}
@media (max-width:720px){.exec-metrics,.exec-brief{grid-template-columns:1fr;}.exec-title{font-size:25px;}.content,.context-bar,.tabs,.topbar{padding-left:18px;padding-right:18px;}}
@media print{.exec-hero{box-shadow:none;background:#fff;color:#111827;border:1px solid #D0D7E2;}.exec-sub,.exec-brief-text{color:#344054;}.exec-brief-card,.exec-metric{background:#fff;color:#111827;border:1px solid #D0D7E2;box-shadow:none;}}

function areaChartSVG(points, color, id) { const W = 560, H = 230, pad = { l: 46, r: 14, t: 14, b: 28 }; const max = Math.max(...points.map((p) => p.value), 1) * 1.12; const xx = (i) => pad.l + (points.length <= 1 ? (W - pad.l - pad.r) / 2 : (i * (W - pad.l - pad.r)) / (points.length - 1)); const yy = (v) => H - pad.b - (v / max) * (H - pad.t - pad.b); const line = points.map((p, i) => `${i ? "L" : "M"}${xx(i).toFixed(1)},${yy(p.value).toFixed(1)}`).join(" "); const area = `${line} L${xx(points.length - 1).toFixed(1)},${H - pad.b} L${xx(0).toFixed(1)},${H - pad.b} Z`; const grid = [0, 0.25, 0.5, 0.75, 1].map((f) => { const y = pad.t + f * (H - pad.t - pad.b); return `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" stroke="#E8EDF5"/><text x="${pad.l - 6}" y="${y + 3}" text-anchor="end" font-size="9" fill="${MUTED}">${fmtCompact(max * (1 - f))}</text>`; }).join(""); const xl = points.map((p, i) => `<text x="${xx(i)}" y="${H - 8}" text-anchor="middle" font-size="10" fill="${MUTED}">${esc2(p.label)}</text>`).join(""); const dots = points.map((p, i) => `<circle cx="${xx(i)}" cy="${yy(p.value)}" r="3" fill="${color}"><title>${esc2(p.label)}: ${fmtFull(p.value)}</title></circle>`).join(""); return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:240px"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0.02"/></linearGradient></defs>${grid}<path d="${area}" fill="url(#${id})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2.4"/>${dots}${xl}</svg>`; }
function dualTrendSVG(points) { const W = 560, H = 230, pad = { l: 46, r: 46, t: 14, b: 28 }; const maxR = Math.max(...points.map((p) => p.reach), 1) * 1.12, maxA = Math.max(...points.map((p) => p.apps), 1) * 1.18; const xx = (i) => pad.l + (points.length <= 1 ? (W - pad.l - pad.r) / 2 : (i * (W - pad.l - pad.r)) / (points.length - 1)); const yR = (v) => H - pad.b - (v / maxR) * (H - pad.t - pad.b), yA = (v) => H - pad.b - (v / maxA) * (H - pad.t - pad.b); const lineR = points.map((p, i) => `${i ? "L" : "M"}${xx(i).toFixed(1)},${yR(p.reach).toFixed(1)}`).join(" "); const areaR = `${lineR} L${xx(points.length - 1).toFixed(1)},${H - pad.b} L${xx(0).toFixed(1)},${H - pad.b} Z`; const lineA = points.map((p, i) => `${i ? "L" : "M"}${xx(i).toFixed(1)},${yA(p.apps).toFixed(1)}`).join(" "); const grid = [0, 0.5, 1].map((f) => { const y = pad.t + f * (H - pad.t - pad.b); return `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" stroke="#E8EDF5"/>`; }).join(""); const xl = points.map((p, i) => `<text x="${xx(i)}" y="${H - 8}" text-anchor="middle" font-size="10" fill="${MUTED}">${esc2(p.label)}</text>`).join(""); const dotsA = points.map((p, i) => `<circle cx="${xx(i)}" cy="${yA(p.apps)}" r="3.2" fill="${GOLD}"><title>${esc2(p.label)} · Ứng tuyển: ${fmtFull(p.apps)}</title></circle>`).join(""); return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:240px"><defs><linearGradient id="gReach" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#315BFF" stop-opacity="0.28"/><stop offset="100%" stop-color="#315BFF" stop-opacity="0.02"/></linearGradient></defs>${grid}<path d="${areaR}" fill="url(#gReach)"/><path d="${lineR}" fill="none" stroke="#315BFF" stroke-width="2"/><path d="${lineA}" fill="none" stroke="${GOLD}" stroke-width="2.6"/>${dotsA}${xl}</svg><div class="legend"><span><i style="background:#3366FF"></i>Tiếp cận (trái)</span><span><i style="background:${GOLD}"></i>Ứng tuyển (phải)</span></div>`; }
function donutPath(cx, cy, r, ir, a0, a1) { const p = (rad, a) => [cx + rad * Math.cos(a), cy + rad * Math.sin(a)]; const [x0, y0] = p(r, a0), [x1, y1] = p(r, a1), [xi1, yi1] = p(ir, a1), [xi0, yi0] = p(ir, a0); const large = a1 - a0 > Math.PI ? 1 : 0; return `M${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1} L${xi1},${yi1} A${ir},${ir} 0 ${large} 0 ${xi0},${yi0} Z`; }

const STATUS_COLOR = { "Hoàn thành": "#1F8A5B", "Đúng tiến độ": "#3CBED8", "Đang triển khai": GOLD, "Cần chú ý": "#D9482E", "Lên kế hoạch": MUTED };
function projectsHTML() {
  const cards = state.data.projects.map((p) => { const col = STATUS_COLOR[p.status] || MUTED; return `<div class="proj-card"><div class="proj-top"><div><div class="proj-name">${esc2(p.name)}</div><div class="proj-type">${esc2(p.type)}</div></div><span class="proj-badge" style="background:${col}1a;color:${col}">● ${esc2(p.status)}</span></div><div class="proj-prog"><div class="load-track"><div class="load-fill" style="width:${Math.min(100, p.progress)}%;background:${col}"></div></div><span class="proj-pct">${p.progress}%</span></div>${p.timeline ? `<div class="proj-line">🗓 ${esc2(p.timeline)}</div>` : ""}${p.activities ? `<div class="proj-line">📍 ${esc2(p.activities)}</div>` : ""}<div class="proj-row"><span class="proj-tag done">✓ Done</span><span>${esc2(p.done)}</span></div><div class="proj-row"><span class="proj-tag next">→ Next</span><span>${esc2(p.next)}</span></div><div class="proj-row"><span class="proj-tag pain">⚠ Pain</span><span>${esc2(p.pain)}</span></div></div>`; }).join("");
  return `<div class="stack"><div class="ch-header" style="border-left-color:${PURPLE}"><div class="ch-head-l">${bigIcon("projects")}<div><div class="ch-name">Tình trạng dự án EB (non-data)</div><div class="ch-aud">Tiến độ · phasing · status · Done / Next / Pain</div></div></div><span class="ch-pill" style="background:${PURPLE}1a;color:${PURPLE}">Projects</span></div><div class="proj-grid">${cards}</div></div>`;
}

/* ----- Khung trang ----- */
function render() {
  const d = state.data; const series = curSeries(); const cur = series[series.length - 1];
  const periodBtns = [["weeks", "Bi-weekly"], ["months", "Tháng"], ["ytd", "YTD"]].map(([p, l]) => `<button data-p="${p}" class="${state.periodType === p ? "seg-on" : ""}">${l}</button>`).join("");
  const TABS = [["hub", "Tổng quan"], ...CHANNEL_KEYS.map((k) => [k, CHANNELS[k].short]), ["content", "Content Matrix"], ["projects", "Dự án"]];
  const tabs = TABS.map(([id, lab]) => `<button class="tab ${state.tab === id ? "on" : ""}" data-tab="${id}" ${state.tab === id && CHANNELS[id] ? `style="border-color:${CHANNELS[id].color};color:${CHANNELS[id].color}"` : ""}>${lab}</button>`).join("");
  let content;
  if (state.tab === "hub") content = hubHTML();
  else if (state.tab === "content") content = contentHTML();
  else if (state.tab === "projects") content = projectsHTML();
  else content = channelHTML(state.tab);
  app().innerHTML = `<header class="topbar no-print"><div class="brand"><img class="brand-logo" src="${PNJ_LOGO}" alt="PNJ"/><div class="brand-text"><div class="brand-line1">EMPLOYER BRANDING</div><div class="brand-line2">EB Performance Hub</div></div></div><div class="topbar-actions"><div class="seg">${periodBtns}</div><button class="btn ghost" id="btnAdd">+ Kỳ mới</button><button class="btn ghost" id="btnSource">Kết nối Sheet</button><button class="btn ghost" id="btnEdit">Cập nhật số liệu</button><button class="btn solid" id="btnPrint">Xuất báo cáo</button></div></header><div class="context-bar"><div><div class="context-title">Báo cáo hiệu quả kênh EB · ${esc2(cur.label)}</div><div class="context-sub">Định vị <b>Lifestyle Retail Employer</b> · ${state.periodType === "ytd" ? "Luỹ kế đầu năm, so với mục tiêu năm" : "So với kỳ trước & mục tiêu " + (state.periodType === "weeks" ? "bi-weekly" : "tháng")}</div></div><div class="context-meta">Cập nhật: ${new Date(d.updatedAt).toLocaleString("vi-VN")}<button class="link-btn no-print" id="btnReset">↺ dữ liệu mẫu</button></div></div><nav class="tabs no-print">${tabs}</nav><main class="content">${content}</main><footer class="foot-note">PNJ · Employer Branding — file chạy độc lập, không cần Internet. Cập nhật dữ liệu qua \"Kết nối Sheet\".</footer>`;
  document.querySelectorAll(".seg button").forEach((b) => b.onclick = () => { state.periodType = b.dataset.p; render(); });
  document.querySelectorAll(".tab").forEach((b) => b.onclick = () => { state.tab = b.dataset.tab; render(); });
  document.getElementById("btnAdd").onclick = addPeriod;
  document.getElementById("btnSource").onclick = openSource;
  document.getElementById("btnEdit").onclick = openEdit;
  document.getElementById("btnPrint").onclick = () => window.print();
  document.getElementById("btnReset").onclick = () => { if (confirm("Khôi phục dữ liệu mẫu? Mọi chỉnh sửa sẽ bị xoá.")) persist(makeDefaultData()); };
}

function addPeriod() { if (state.periodType === "ytd") { alert("YTD là chế độ luỹ kế tự tính — hãy thêm kỳ ở Bi-weekly hoặc Tháng."); return; } const d = JSON.parse(JSON.stringify(state.data)); const arr = d[state.periodType]; const last = arr[arr.length - 1]; arr.push({ label: state.periodType === "weeks" ? "Bi-weekly mới" : "Tháng mới", short: "Mới", channels: JSON.parse(JSON.stringify(last.channels)) }); if (arr.length > 12) arr.shift(); d.updatedAt = new Date().toISOString(); persist(d); openEdit(); }
function overlay(inner) { const o = document.createElement("div"); o.className = "modal-overlay"; o.innerHTML = `<div class="modal">${inner}</div>`; o.onclick = (e) => { if (e.target === o) document.body.removeChild(o); }; document.body.appendChild(o); return o; }
function openEdit() { if (state.periodType === "ytd") { alert("Chế độ YTD chỉ để xem. Hãy chuyển sang Bi-weekly/Tháng để cập nhật."); return; } const arr = state.data[state.periodType], latest = arr[arr.length - 1]; let body = `<label class="field"><span>Tên kỳ báo cáo</span><input id="ed_label" value="${esc2(latest.label)}"/></label>`; CHANNEL_KEYS.forEach((ck) => { body += `<div class="edit-channel"><div class="edit-channel-title" style="color:${CHANNELS[ck].color}">${CHANNELS[ck].name}</div><div class="edit-grid">`; CHANNELS[ck].metrics.forEach((m) => { const u = m.fmt === "pct" ? " (%)" : m.fmt === "sec" ? " (giây)" : m.fmt === "min" ? " (phút)" : ""; body += `<label class="field"><span>${m.label}${u}</span><input type="number" step="${RATE_FMT.has(m.fmt) ? "0.1" : "1"}" data-ck="${ck}" data-mk="${m.key}" value="${latest.channels[ck][m.key]}"/></label>`; }); body += `</div></div>`; }); const o = overlay(`<div class="modal-head"><h3>Cập nhật số liệu — ${state.periodType === "weeks" ? "Bi-weekly" : "Tháng"} mới nhất</h3><button class="x-btn" id="ex">✕</button></div><div class="modal-body">${body}</div><div class="modal-foot"><button class="btn ghost" id="ec">Huỷ</button><button class="btn solid" id="es">Lưu số liệu</button></div>`); const close = () => document.body.removeChild(o); o.querySelector("#ex").onclick = close; o.querySelector("#ec").onclick = close; o.querySelector("#es").onclick = () => { const d = JSON.parse(JSON.stringify(state.data)); const p = d[state.periodType][d[state.periodType].length - 1]; p.label = o.querySelector("#ed_label").value || p.label; o.querySelectorAll("input[data-ck]").forEach((inp) => { const v = inp.value === "" ? 0 : Number(inp.value); p.channels[inp.dataset.ck][inp.dataset.mk] = isFinite(v) ? v : 0; }); d.updatedAt = new Date().toISOString(); close(); persist(d); }; }

function openSource() {
  const sec = (title, hint, id) => `<div class="src-method"><div class="src-step">${title}</div><p class="src-hint">${hint}</p><button class="btn ghost mini" data-dl="${id}">⬇ Tải mẫu CSV</button><textarea data-csv="${id}" placeholder="Dán dữ liệu tab ${id} (gồm dòng tiêu đề)…"></textarea><button class="btn solid mini" data-go="${id}">Nạp dữ liệu</button></div>`;
  const o = overlay(`<div class="modal-head"><h3>Kết nối nguồn dữ liệu (Google Sheet)</h3><button class="x-btn" id="sx">✕</button></div><div class="modal-body"><p class="src-intro">Mỗi trang có một tab riêng. Cách dùng: trong từng tab, bôi đen toàn bộ vùng dữ liệu (gồm tiêu đề) → Copy → dán vào ô tương ứng → <b>Nạp dữ liệu</b>.</p>${sec("Số liệu kênh — tab DATA", "Mỗi dòng một kỳ, mỗi cột một chỉ số.", "DATA")}${sec("Mục tiêu KPI — tab TARGETS", "Mục tiêu Tuần/Tháng/YTD cho từng chỉ số (tính loading %).", "TARGETS")}${sec("EVP — tab CONTENT_EVP", "03 trụ EVP + số bài kế hoạch & thực tế.", "CONTENT_EVP")}${sec("Content Pillar — tab CONTENT_PILLARS", "Mỗi tuyến nội dung: số bài & chủ đề đã đăng.", "CONTENT_PILLARS")}${sec("Dự án — tab PROJECTS", "status, progress, timeline, done, next, pain…", "PROJECTS")}<div id="sstatus"></div></div><div class="modal-foot"><button class="btn ghost" id="sc">Đóng</button></div>`);
  const close = () => document.body.removeChild(o); const setStatus = (t, m) => { o.querySelector("#sstatus").innerHTML = `<div class="src-status src-${t}">${m}</div>`; };
  o.querySelector("#sx").onclick = close; o.querySelector("#sc").onclick = close;
  const dlMap = { DATA: () => dataToCSV(state.data), TARGETS: () => targetsToCSV(state.data.targets), CONTENT_EVP: () => evpToCSV(state.data.contentEVP), CONTENT_PILLARS: () => pillarsToCSV(state.data.contentPillars), PROJECTS: () => projectsToCSV(state.data.projects) };
  o.querySelectorAll("[data-dl]").forEach((b) => b.onclick = () => { const id = b.dataset.dl; const blob = new Blob(["\uFEFF" + dlMap[id]()], { type: "text/csv;charset=utf-8;" }); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "pnj-eb-" + id + ".csv"; a.click(); URL.revokeObjectURL(a.href); });
  o.querySelectorAll("[data-go]").forEach((b) => b.onclick = () => { const id = b.dataset.go; const txt = o.querySelector(`[data-csv="${id}"]`).value; try { const d = JSON.parse(JSON.stringify(state.data)); if (id === "DATA") { persist(csvToDATA(txt, d)); } else { if (id === "TARGETS") d.targets = csvToTARGETS(txt); else if (id === "CONTENT_EVP") d.contentEVP = csvToEVP(txt); else if (id === "CONTENT_PILLARS") d.contentPillars = csvToPILLARS(txt); else if (id === "PROJECTS") d.projects = csvToPROJECTS(txt); d.updatedAt = new Date().toISOString(); persist(d); } setStatus("ok", "Nạp tab " + id + " thành công — dashboard đã cập nhật."); } catch (e) { setStatus("err", "Tab " + id + ": dữ liệu chưa đúng định dạng. Bấm \"Tải mẫu CSV\" để xem đúng cột."); } });
}

function migrate(d) { const def = makeDefaultData(); if (!d.targets || !d.targets.ytd || d.targets.ytd.fp_followers === undefined) d.targets = def.targets; if (!d.contentEVP) d.contentEVP = def.contentEVP; if (!d.contentPillars) d.contentPillars = def.contentPillars; if (!d.projects) d.projects = def.projects; else d.projects.forEach((p) => { if (p.pain === undefined) p.pain = ""; }); ["months", "weeks"].forEach((t) => { if (!Array.isArray(d[t])) { d[t] = def[t]; return; } d[t].forEach((p) => { CHANNEL_KEYS.forEach((ck) => { if (!p.channels[ck]) p.channels[ck] = {}; CHANNELS[ck].metrics.forEach((m) => { if (p.channels[ck][m.key] === undefined) p.channels[ck][m.key] = BASE[ck][m.key]; }); }); Object.keys(p.channels).forEach((k) => { if (!CHANNELS[k]) delete p.channels[k]; }); }); }); return d; }

const stored = loadStored();
state.data = stored ? migrate(stored) : makeDefaultData();
render();



</script></body></html>
